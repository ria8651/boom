services:
  boom:
    build: .
    image: boom:latest
    pull_policy: never
    container_name: boom
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LIVEKIT_URL=${LIVEKIT_URL}
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - BOOM_SESSION_SECRET=${BOOM_SESSION_SECRET}
      - BOOM_ALLOWED_USERS=${BOOM_ALLOWED_USERS}
      - BOOM_ALLOWED_ORGS=${BOOM_ALLOWED_ORGS}
    depends_on:
      - livekit

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    command: --config /etc/livekit.yaml

  egress:
    image: livekit/egress:latest
    container_name: egress
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_STRING={"api_key":"${LIVEKIT_API_KEY}","api_secret":"${LIVEKIT_API_SECRET}","ws_url":"ws://livekit:7880"}
    volumes:
      - ./recordings:/home/egress/tmp
    depends_on:
      - livekit
