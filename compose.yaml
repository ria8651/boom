services:
  boom:
    build: .
    image: boom:latest
    pull_policy: never
    container_name: boom
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - LIVEKIT_URL=${LIVEKIT_URL:-ws://localhost:7880}
      - LIVEKIT_SERVER_URL=ws://livekit:7880
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - BOOM_SESSION_SECRET=${BOOM_SESSION_SECRET}
      - BOOM_ALLOWED_USERS=${BOOM_ALLOWED_USERS}
      - BOOM_ALLOWED_ORGS=${BOOM_ALLOWED_ORGS}
    volumes:
      - ${BOOM_RECORDINGS_DIR:-./recordings}:/out
    depends_on:
      - livekit

  livekit:
    image: livekit/livekit-server:latest
    container_name: livekit
    restart: unless-stopped
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - "LIVEKIT_KEYS=${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"
    command:
      - --node-ip
      # Browsers connect to LiveKit at this IP for WebRTC media. The container's
      # 127.0.0.1 is unreachable from outside, so this MUST be set to a real
      # routable address (LAN IP for local dev, public IP for production).
      - ${LIVEKIT_NODE_IP:?set LIVEKIT_NODE_IP in .env to your LAN or public IP — see .env.example}
      - --config-body
      - |
        port: 7880
        rtc:
          port_range_start: 7882
          port_range_end: 7882
          use_external_ip: false
        bind_addresses:
          - 0.0.0.0
        logging:
          level: info
        redis:
          address: redis:6379
        webhook:
          api_key: ${LIVEKIT_API_KEY}
          urls:
            - http://boom:3000/api/livekit/webhook
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

  egress:
    image: livekit/egress:latest
    container_name: egress
    restart: unless-stopped
    cap_add:
      - SYS_ADMIN
    environment:
      EGRESS_CONFIG_BODY: '{"api_key":"${LIVEKIT_API_KEY}","api_secret":"${LIVEKIT_API_SECRET}","ws_url":"ws://livekit:7880","redis":{"address":"redis:6379"},"insecure":true}'
    volumes:
      - ${BOOM_RECORDINGS_DIR:-./recordings}:/out
    depends_on:
      - livekit
      - redis
